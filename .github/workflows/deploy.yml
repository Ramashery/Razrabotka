name: Build and Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'dev/**'
  pull_request:
    branches:
      - main
      - 'feature/**'
      - 'dev/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install -g firebase-tools

      - name: Generate Site
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAZRABOTKA }}
        run: python generate_site.py

      # Проверка: убеждаемся, что index.html существует перед деплоем
      - name: List public directory contents
        run: |
          echo "Listing contents of ./public:"
          ls -R ./public
          echo "--- End of ./public listing ---"
          if [ ! -f ./public/index.html ]; then
            echo "ERROR: ./public/index.html was not found. Site will likely return 404."
            exit 1
          fi

      - name: Determine Branch Strategy
        id: set_deploy_info
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH_NAME="${{ github.head_ref }}"
          fi
          
          SANITIZED_CHANNEL_NAME=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9-]/-/g' | tr '[:upper:]' '[:lower:]')

          if [[ "$BRANCH_NAME" == "main" ]]; then
            echo "IS_MAIN_BRANCH=true" >> $GITHUB_OUTPUT
            echo "CHANNEL_ID=" >> $GITHUB_OUTPUT
            echo "EXPIRES=" >> $GITHUB_OUTPUT
          else
            echo "IS_MAIN_BRANCH=false" >> $GITHUB_OUTPUT
            echo "CHANNEL_ID=$SANITIZED_CHANNEL_NAME" >> $GITHUB_OUTPUT
            echo "EXPIRES=7d" >> $GITHUB_OUTPUT
          fi

      # --- ЛОГИКА ДЛЯ MAIN (ПРЯМОЙ ДЕПЛОЙ) ---
      
      # 1. Создаем файл ключа из секрета (только для main)
      - name: Create Service Account File
        if: steps.set_deploy_info.outputs.IS_MAIN_BRANCH == 'true'
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAZRABOTKA }}' > service_account.json

      # 2. Прямой деплой через CLI (гарантирует загрузку файлов)
      - name: Deploy to Live (Raw CLI)
        if: steps.set_deploy_info.outputs.IS_MAIN_BRANCH == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service_account.json
        run: npx firebase-tools deploy --project razrabotka-b61bc --only hosting --message "Deploy from GitHub Actions" --debug

      # --- ЛОГИКА ДЛЯ ДРУГИХ ВЕТОК (ПРЕВЬЮ) ---
      
      - name: Deploy to Preview Channel
        if: steps.set_deploy_info.outputs.IS_MAIN_BRANCH == 'false'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RAZRABOTKA }}'
          projectId: 'razrabotka-b61bc'
          channelId: '${{ steps.set_deploy_info.outputs.CHANNEL_ID }}'
          expires: '${{ steps.set_deploy_info.outputs.EXPIRES }}'
